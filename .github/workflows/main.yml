name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Force installation of core requirements to prevent missing CI modules
          pip install redis shap scikit-learn feast joblib pydantic uvicorn celery prometheus-fastapi-instrumentator python-dotenv
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx requests

      - name: Start API in background
        run: |
          # UPDATED: Corrected from project01.py to your actual app file app01.py
          python app01.py & 
          sleep 5 

      - name: Run tests
        run: python -m pytest

      - name: Build Docker image
        run: docker build -t mlops-app .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker tag mlops-app ${{ secrets.DOCKER_USERNAME }}/mlops-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/mlops-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}