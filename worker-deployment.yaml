apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-worker
  template:
    metadata:
      labels:
        app: ml-worker
    spec:
      containers:
      - name: ml-worker
        image: madhug17/ml-fastapi-app:v2
        imagePullPolicy: Always
        command: ["python", "worker.py"]
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"